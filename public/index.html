<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wasabi Scope — beta</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { --bg:#0f1115; --bg-2:#171a21; --text:#e6e8ec; --text-2:#a0a6b3; --accent:#22c55e; --border:#2a2f3a; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    main { max-width: 560px; margin: 80px auto; padding: 0 24px; }
    h1 { font-size: 32px; margin: 0 0 8px; }
    .sub { color: var(--text-2); margin-bottom: 32px; }
    .card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    label { display:block; font-size:13px; color: var(--text-2); margin-bottom:4px; }
    input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font: inherit; margin-bottom: 16px; outline: none; }
    input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: var(--bg); padding: 10px 20px; border: 0; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    .result { margin-top: 24px; padding: 16px; background: var(--bg); border-radius: 8px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; word-break: break-all; }
    .muted { color: var(--text-2); font-size: 13px; }
    a { color: var(--accent); }
  </style>
</head>
<body>
<main>
  <h1>🥒 Wasabi Scope</h1>
  <p class="sub">AI requirements capture for client scoping sessions. Beta access by Wasabi Digital.</p>

  <div class="card">
    <h2 style="margin-top:0">Beta signup</h2>
    <p class="muted">Get an API token to paste into the Chrome extension.</p>
    <label>Email</label>
    <input id="email" type="email" placeholder="you@yourcompany.com" />
    <label>Display name</label>
    <input id="name" type="text" placeholder="Your name" />
    <button id="signup">Get token</button>
    <div id="result" class="result" style="display:none"></div>
  </div>

  <p class="muted" style="margin-top:32px">
    Paste your token into the extension Settings → API token.<br>
    Lost it? Submit again with the same email to rotate.
  </p>
</main>
<script>
document.getElementById('signup').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const displayName = document.getElementById('name').value.trim();
  if (!email) return alert('Email required');
  const r = await fetch('/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, displayName })
  });
  const data = await r.json();
  const el = document.getElementById('result');
  el.style.display = 'block';
  if (data.token) {
    el.innerHTML = `<strong>Your token (save this):</strong><br>${data.token}`;
  } else {
    el.textContent = 'Error: ' + (data.error || 'unknown');
  }
});
</script>
</body>
</html>
