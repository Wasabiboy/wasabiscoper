[build]
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"

# CORS so the Chrome extension can call these endpoints from any origin
# (extensions don't have a stable origin — they use chrome-extension://<id>)
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization, x-wasabi-token"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

# Clean URLs: /api/sessions → /.netlify/functions/sessions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
